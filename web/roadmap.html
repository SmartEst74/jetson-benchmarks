<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Test Roadmap — Jetson LLM Guide</title>
<style>
:root{--bg:#0d1117;--surface:#161b22;--surface2:#1c2333;--border:#30363d;--green:#39d353;--green2:#26a641;--yellow:#f0c000;--red:#f85149;--blue:#58a6ff;--purple:#bc8cff;--orange:#f78166;--text:#e6edf3;--muted:#8b949e;--dim:#484f58}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}
.wrap{max-width:1100px;margin:0 auto;padding:24px 20px}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
nav .logo{font-weight:700;font-size:18px;color:var(--green);display:flex;align-items:center;gap:8px}
nav .logo svg{width:20px;height:20px;fill:var(--green)}
nav a{color:var(--muted);font-size:14px;font-weight:500;padding:4px 0;border-bottom:2px solid transparent}
nav a:hover,nav a.active{color:var(--text);text-decoration:none;border-bottom-color:var(--green)}
nav .gh{margin-left:auto;color:var(--muted);font-size:13px}
.hero{padding:40px 0 32px;text-align:center}
.hero h1{font-size:32px;font-weight:800;background:linear-gradient(135deg,var(--green),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{color:var(--muted);max-width:700px;margin:12px auto 0;font-size:16px}
.timeline{position:relative;padding-left:40px}
.timeline::before{content:'';position:absolute;left:16px;top:0;bottom:0;width:2px;background:var(--border)}
.phase{position:relative;margin-bottom:40px}
.phase::before{content:'';position:absolute;left:-28px;top:6px;width:14px;height:14px;border-radius:50%;border:2px solid var(--border);background:var(--bg)}
.phase.active::before{border-color:var(--green);background:var(--green);box-shadow:0 0 12px rgba(57,211,83,.4)}
.phase.done::before{border-color:var(--green);background:var(--green)}
.phase-head{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.phase-num{font-size:12px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
.phase-name{font-size:20px;font-weight:700}
.phase-status{font-size:11px;padding:2px 10px;border-radius:999px;font-weight:600}
.phase-status.planned{background:rgba(240,192,0,.12);color:var(--yellow)}
.phase-status.active{background:rgba(57,211,83,.12);color:var(--green)}
.phase-status.done{background:rgba(57,211,83,.12);color:var(--green)}
.phase-desc{color:var(--muted);font-size:14px;margin-bottom:16px;line-height:1.5}
.model-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.mc{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;transition:border-color .2s}
.mc:hover{border-color:var(--green)}
.mc .mc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.mc .mc-name{font-weight:700;font-size:15px}
.mc .mc-pri{font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px}
.mc .mc-pri.critical{background:rgba(248,81,73,.12);color:var(--red)}
.mc .mc-pri.high{background:rgba(240,192,0,.12);color:var(--yellow)}
.mc .mc-pri.medium{background:rgba(88,166,255,.12);color:var(--blue)}
.mc .mc-pri.low{background:rgba(139,148,158,.12);color:var(--muted)}
.mc .mc-why{color:var(--muted);font-size:12px;line-height:1.4;margin-bottom:10px}
.mc .mc-stats{display:flex;gap:8px;flex-wrap:wrap}
.mc .mc-stat{font-size:11px;background:var(--surface2);padding:2px 8px;border-radius:4px}
.mc .mc-stat .sk{color:var(--muted)}
.mc .mc-stat .sv{color:var(--green);font-weight:600}
.mc .mc-blocker{margin-top:8px;font-size:11px;color:var(--red);background:rgba(248,81,73,.08);padding:4px 8px;border-radius:4px}
.summary{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:32px;text-align:center}
.summary h2{font-size:20px;margin-bottom:12px}
.summary-grid{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.summary-item{text-align:center}
.summary-item .sv{font-size:28px;font-weight:800;color:var(--green)}
.summary-item .sl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.footer{text-align:center;padding:32px 0;color:var(--dim);font-size:12px;border-top:1px solid var(--border);margin-top:40px}
</style>
</head>
<body>
<nav>
  <div class="logo"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg> Jetson LLM Guide</div>
  <a href="benchmarks.html">Benchmarks</a>
  <a href="roles.html">Agent Roles</a>
  <a href="roadmap.html" class="active">Test Roadmap</a>
  <span class="gh">github.com/SmartEst74/jetson-llm-guide</span>
</nav>
<div class="wrap">
  <div class="hero">
    <h1>Test Roadmap</h1>
    <p>Prioritized test plan based on BFCL v4 scores, predicted throughput, and potential to improve our agent roles. Models sorted by expected impact.</p>
  </div>
  <div class="summary" id="summary"></div>
  <div class="timeline" id="timeline"></div>
</div>
<div class="footer">Jetson LLM Guide · <a href="https://github.com/SmartEst74/jetson-llm-guide">Source</a></div>
<script>
fetch('../data/test-roadmap.json').then(r=>r.json()).then(phases=>{
  const totalModels=phases.reduce((s,p)=>s+p.models.length,0);
  const critical=phases.reduce((s,p)=>s+p.models.filter(m=>m.priority==='critical').length,0);
  const high=phases.reduce((s,p)=>s+p.models.filter(m=>m.priority==='high').length,0);
  document.getElementById('summary').innerHTML='<h2>Test Queue Overview</h2><div class="summary-grid">'+
    '<div class="summary-item"><div class="sv">'+phases.length+'</div><div class="sl">Test Phases</div></div>'+
    '<div class="summary-item"><div class="sv">'+totalModels+'</div><div class="sl">Models Queued</div></div>'+
    '<div class="summary-item"><div class="sv">'+critical+'</div><div class="sl">Critical Priority</div></div>'+
    '<div class="summary-item"><div class="sv">'+high+'</div><div class="sl">High Priority</div></div></div>';
  const tl=document.getElementById('timeline');
  phases.forEach(ph=>{
    const cls=ph.status==='done'?'done':ph.status==='active'?'active':'';
    const cards=ph.models.map(m=>{
      const stats='<div class="mc-stat"><span class="sk">Quant:</span> <span class="sv">'+m.quant+'</span></div>'+
        (m.predicted_tps?'<div class="mc-stat"><span class="sk">Predicted:</span> <span class="sv">~'+m.predicted_tps+' tok/s</span></div>':'')+
        (m.gguf_gb?'<div class="mc-stat"><span class="sk">GGUF:</span> <span class="sv">'+m.gguf_gb+' GB</span></div>':'');
      const blocker=m.blocker?'<div class="mc-blocker">Blocker: '+m.blocker+'</div>':'';
      return '<div class="mc"><div class="mc-head"><span class="mc-name">'+m.model+'</span><span class="mc-pri '+m.priority+'">'+m.priority+'</span></div><div class="mc-why">'+m.why+'</div><div class="mc-stats">'+stats+'</div>'+blocker+'</div>';
    }).join('');
    tl.innerHTML+='<div class="phase '+cls+'"><div class="phase-head"><span class="phase-num">Phase '+ph.phase+'</span><span class="phase-name">'+ph.name+'</span><span class="phase-status '+ph.status+'">'+ph.status+'</span></div><div class="phase-desc">'+ph.description+'</div><div class="model-cards">'+cards+'</div></div>';
  });
}).catch(e=>{document.getElementById('timeline').innerHTML='<p>Failed to load roadmap: '+e.message+'</p>';});
</script>
</body>
</html>
